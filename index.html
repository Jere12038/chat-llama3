<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente IA · Privado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #080b0f;
            --surface:   #0e1318;
            --surface2:  #141c24;
            --border:    #1e2a35;
            --border2:   #253040;
            --text:      #e8edf2;
            --muted:     #4a5f72;
            --accent:    #4d9fff;
            --accent2:   #7eb8ff;
            --gold:      #c9a84c;
            --danger:    #e05555;
            --success:   #4caf89;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --font-display: 'Playfair Display', serif;
            --header-height: 58px;
            --sidebar-width: 290px;
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            /* Grain overlay */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }

        /* ── SIDEBAR ── */
        #sidebar {
            position: fixed;
            top: 0; left: 0;
            height: 100%;
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(.4,0,.2,1);
            z-index: 50;
            display: flex;
            flex-direction: column;
            padding: 0;
        }
        #sidebar.open { transform: translateX(0); }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header span {
            font-family: var(--font-display);
            font-size: 1.1rem;
            color: var(--accent2);
            letter-spacing: 0.02em;
        }

        #new-chat-btn {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border2);
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        #new-chat-btn:hover { border-color: var(--accent); color: var(--accent); }

        #chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            list-style: none;
            scrollbar-width: none;
        }
        #chat-list::-webkit-scrollbar { display: none; }

        .chat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 3px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--muted);
            transition: all 0.18s;
            border: 1px solid transparent;
        }
        .chat-item:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
        .chat-item.active { background: var(--surface2); color: var(--accent2); border-color: var(--border2); }
        .chat-item .fa-trash { opacity: 0; transition: opacity 0.15s; font-size: 0.75rem; }
        .chat-item:hover .fa-trash { opacity: 1; }

        #overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 40;
            display: none;
        }

        /* ── MAIN ── */
        .main-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── HEADER ── */
        .fixed-zone {
            position: fixed;
            left: 0; right: 0;
            background: var(--bg);
            z-index: 10;
        }

        .secondary-info {
            top: 0;
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            background: rgba(8,11,15,0.85);
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-model {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: var(--font-mono);
            letter-spacing: 0.05em;
            padding: 3px 10px;
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        .header-model span { color: var(--accent); }

        #menu-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1rem;
            cursor: pointer;
            transition: color 0.2s;
            padding: 8px;
            border-radius: 6px;
        }
        #menu-btn:hover { color: var(--text); background: var(--surface2); }

        .header-right {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.8rem; color: var(--muted);
        }
        .status-dot {
            width: 6px; height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── INPUT AREA ── */
        .input-area {
            bottom: 0;
            padding: 16px 24px 20px;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
        }

        .suggested-actions {
            display: flex; gap: 8px; flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 12px;
        }
        .action-btn {
            background: var(--surface);
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .action-btn:hover { border-color: var(--accent); color: var(--accent2); background: var(--surface2); }

        .input-wrapper {
            width: 95%;
            margin: 0 auto;
            position: relative;
            background: var(--surface);
            border-radius: 16px;
            padding: 6px 6px 6px 8px;
            display: flex;
            align-items: flex-end;
            border: 1px solid var(--border);
            transition: border-color 0.25s, box-shadow 0.25s;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .input-wrapper:focus-within {
            border-color: var(--border2);
            box-shadow: 0 0 0 1px var(--border2), 0 8px 32px rgba(77,159,255,0.08);
        }

        #input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 0.95rem;
            font-family: var(--font-body);
            outline: none;
            resize: none;
            overflow: hidden;
            min-height: 1.5em;
            max-height: 200px;
            line-height: 1.6;
        }
        #input::placeholder { color: var(--muted); }

        .icon-btn {
            background: none;
            border: none;
            color: var(--muted);
            padding: 9px 10px;
            cursor: pointer;
            transition: color 0.2s;
            font-size: 0.95rem;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .icon-btn:hover { color: var(--accent2); background: var(--surface2); }

        #send-btn {
            background: var(--accent);
            color: #fff;
            border-radius: 10px;
            width: 38px; height: 38px;
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0;
            margin-right: 2px;
            transition: all 0.2s;
            box-shadow: 0 2px 12px rgba(77,159,255,0.3);
        }
        #send-btn:hover { background: var(--accent2); transform: translateY(-1px); }
        #send-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; box-shadow: none; transform: none; }

        /* ── CHAT VIEW ── */
        #chat-view {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: calc(var(--header-height) + 20px) 24px calc(160px);
            scrollbar-width: none;
        }
        #chat-view::-webkit-scrollbar { display: none; }
        #chat-view > :first-child { margin-top: auto; }

        /* ── MESSAGES ── */
        .msg {
            padding: 13px 17px;
            border-radius: var(--radius);
            line-height: 1.7;
            font-size: 0.93rem;
            max-width: 82%;
            animation: msg-in 0.22s cubic-bezier(.4,0,.2,1) both;
        }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .user {
            background: var(--surface2);
            color: var(--text);
            align-self: flex-end;
            border: 1px solid var(--border2);
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: var(--surface);
            color: var(--text);
            align-self: flex-start;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            position: relative;
        }
        .bot::before {
            content: '';
            position: absolute;
            left: -1px; top: 16px;
            width: 2px; height: 24px;
            background: linear-gradient(to bottom, var(--accent), transparent);
            border-radius: 2px;
        }

        /* ── WELCOME / ACCESS ── */
        #welcome-view, #access-view {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: var(--header-height);
            padding-bottom: 180px;
            gap: 0;
        }

        .welcome-icon {
            width: 56px; height: 56px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            color: var(--accent);
            margin-bottom: 20px;
            box-shadow: 0 0 32px rgba(77,159,255,0.12);
        }

        #welcome-view h1, #access-view h1 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 10px;
            letter-spacing: -0.01em;
        }
        #welcome-view p, #access-view p {
            font-size: 0.92rem;
            color: var(--muted);
            margin-bottom: 10px;
            line-height: 1.6;
        }

        /* ACCESS FORM */
        #access-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 28px;
        }
        #access-form input[type="password"] {
            padding: 12px 18px;
            border: 1px solid var(--border2);
            border-radius: 10px;
            background: var(--surface);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            width: 280px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            letter-spacing: 0.1em;
        }
        #access-form input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(77,159,255,0.12);
        }
        #access-form button {
            padding: 11px 28px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(77,159,255,0.25);
        }
        #access-form button:hover { background: var(--accent2); transform: translateY(-1px); }

        /* ── DOWNLOAD BAR ── */
        .download-bar {
            display: flex; gap: 6px; flex-wrap: wrap;
            margin-top: 8px;
        }
        .download-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 4px 11px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.18s;
            display: flex; align-items: center; gap: 5px;
        }
        .download-btn:hover { border-color: var(--accent); color: var(--accent2); background: rgba(77,159,255,0.06); }
        .download-btn.pdf:hover { border-color: var(--danger); color: var(--danger); background: rgba(224,85,85,0.06); }
        .download-btn.word:hover { border-color: var(--accent); color: var(--accent); }
        .download-btn.code:hover { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.06); }

        /* ── CODE BLOCKS ── */
        .code-block {
            background: #060a0e;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .code-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 14px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            font-size: 0.72rem;
            color: var(--muted);
            font-family: var(--font-mono);
            letter-spacing: 0.06em;
        }
        .code-block pre {
            margin: 0;
            padding: 14px;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.83rem;
            color: #c9d8e8;
            line-height: 1.65;
            white-space: pre;
        }
        .copy-btn {
            background: none;
            border: 1px solid var(--border2);
            color: var(--muted);
            padding: 2px 9px;
            border-radius: 4px;
            font-size: 0.68rem;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.15s;
        }
        .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ── SIDEBAR FOOTER ── */
        .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--muted);
            font-family: var(--font-mono);
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-footer::before {
            content: '';
            width: 5px; height: 5px;
            background: var(--border2);
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <span>Conversaciones</span>
        <button id="new-chat-btn" onclick="newChat()"><i class="fas fa-plus"></i> Nuevo</button>
    </div>
    <ul id="chat-list"></ul>
    <div class="sidebar-footer">Almacenamiento local</div>
</div>

<div id="overlay" onclick="toggleSidebar()"></div>

<div class="fixed-zone secondary-info" id="header-bar" style="display: none;">
    <div class="header-left">
        <button id="menu-btn" onclick="toggleSidebar()" title="Historial"><i class="fas fa-bars"></i></button>
        <div class="header-model">modelo: <span>kimi-k2</span> / <span>llama-3.3</span></div>
    </div>
    <div class="header-right">
        <div class="status-dot"></div>
        <span>Conectado</span>
    </div>
</div>

<div class="main-container">

    <div id="access-view">
        <div class="welcome-icon"><i class="fas fa-lock"></i></div>
        <h1>Acceso Privado</h1>
        <p>Introduce tu clave para continuar.</p>
        <form id="access-form" onsubmit="event.preventDefault(); checkAccessKey();">
            <input type="password" id="access-key-input" placeholder="••••••••••••" required>
            <button type="submit">Acceder <i class="fas fa-arrow-right"></i></button>
            <p id="access-error" style="color: var(--danger); margin-top: 4px; font-size:0.82rem; display: none;">Clave incorrecta.</p>
        </form>
    </div>

    <div id="welcome-view" style="display: none;">
        <div class="welcome-icon"><i class="fas fa-bolt"></i></div>
        <h1>¿En qué te ayudo?</h1>
        <p>Asistente privado · sin restricciones · genera documentos</p>
    </div>

    <div id="chat-view" style="display: none;"></div>

    <div class="fixed-zone input-area" id="input-controls" style="display: none;">

        <div class="suggested-actions" id="suggested-actions">
            <button class="action-btn" onclick="suggest('Genera un Word con los 5 mejores coches del mundo')"><i class="fas fa-file-word"></i> Generar doc</button>
            <button class="action-btn" onclick="suggest('Escribe un script de Python que...')"><i class="fas fa-code"></i> Código</button>
            <button class="action-btn" onclick="suggest('Explícame ')"><i class="fas fa-graduation-cap"></i> Explicar</button>
        </div>

        <div class="input-wrapper">
            <input type="file" id="file-input" accept="image/*,application/pdf" style="display: none;" onchange="handleFileUpload()">
            <button class="icon-btn" id="attach-btn" title="Adjuntar archivo" onclick="document.getElementById('file-input').click();">
                <i class="fas fa-paperclip"></i>
            </button>
            
            <textarea id="input" placeholder="Escribe tu consulta aquí..." rows="1"></textarea>
            
            <button class="icon-btn" title="Modo Rápido"><i class="fas fa-bolt"></i></button>
            <button onclick="send()" id="send-btn" title="Enviar">
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
        
    </div>

</div>

<script>
    const NETLIFY_FUNCTION_URL = '/.netlify/functions/chat';
    const chatView = document.getElementById('chat-view');
    const welcomeView = document.getElementById('welcome-view');
    const suggestedActions = document.getElementById('suggested-actions');
    const inputField = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const chatList = document.getElementById('chat-list');
    
    // Elementos de la vista de acceso
    const accessView = document.getElementById('access-view');
    const accessKeyInput = document.getElementById('access-key-input');
    const accessError = document.getElementById('access-error');
    const headerBar = document.getElementById('header-bar');
    const inputControls = document.getElementById('input-controls');
    const attachBtn = document.getElementById('attach-btn'); // Botón de adjuntar
    
    const ACCESS_KEY_STORAGE = 'chat_access_key'; 
    let currentChatId = null;
    let chatHistory = []; 
    let accessKey = localStorage.getItem(ACCESS_KEY_STORAGE); 

    let attachedFileBase64 = null;
    let attachedFileName = null;
    let attachedFileMime = null;
    let attachedFileText = null;  // Para PDFs: texto extraído en frontend
    
    // --- Funciones de Gestión del Historial (Sin cambios esenciales) ---

    function generateChatId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    function saveCurrentChat() {
        if (!chatHistory || chatHistory.length === 0) return;

        // Si no tiene ID, es un chat nuevo. Generar ID y título.
        if (!currentChatId) {
            currentChatId = generateChatId();
            // Título basado en la primera pregunta del usuario
            const firstUserMessage = chatHistory.find(m => m.role === 'user')?.content || 'Nuevo Chat';
            const title = firstUserMessage.substring(0, 30) + (firstUserMessage.length > 30 ? '...' : '');
            
            // Añadir título y ID al historial
            chatHistory.unshift({ id: currentChatId, title: title });
        } else {
             // Asegurarse de que el título y ID se mantienen en la primera posición
             const existingChatData = JSON.parse(localStorage.getItem(currentChatId));
             if (existingChatData && existingChatData[0]) {
                 chatHistory[0] = { id: currentChatId, title: existingChatData[0].title };
             }
        }
        
        localStorage.setItem(currentChatId, JSON.stringify(chatHistory));
        loadChatList(); // Refrescar la lista lateral
    }

    function loadChat(id) {
        saveCurrentChat(); // Guardar el chat anterior antes de cargar uno nuevo
        currentChatId = id;
        
        const storedChat = localStorage.getItem(id);
        if (storedChat) {
            // El primer elemento es metadata, el resto es el historial real
            chatHistory = JSON.parse(storedChat);
            renderChatHistory(chatHistory.slice(1)); // Mostrar solo los mensajes
            showChatView();
        } else {
            console.error("Chat no encontrado:", id);
        }
        toggleSidebar();
    }
    
    function newChat() {
        saveCurrentChat(); // Guardar el chat anterior
        currentChatId = null;
        chatHistory = [];
        showWelcomeView();
        chatView.innerHTML = '';
        toggleSidebar();
    }

    function loadChatList() {
        chatList.innerHTML = '';
        let chatKeys = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            // Ignoramos la clave de acceso
            if (key === ACCESS_KEY_STORAGE) continue;
            
            try {
                const chatData = JSON.parse(localStorage.getItem(key));
                // Verificamos que sea un objeto de chat válido y tiene metadata
                if (chatData && Array.isArray(chatData) && chatData.length > 0 && chatData[0].id) {
                    chatKeys.push({ id: key, title: chatData[0].title });
                }
            } catch (e) {
                // Ignorar claves inválidas o no-chat
            }
        }
        
        // Ordenar por la hora de creación (más recientes primero)
        chatKeys.sort((a, b) => parseInt(b.id) - parseInt(a.id));

        chatKeys.forEach(chat => {
            const li = document.createElement('li');
            li.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
            li.onclick = () => loadChat(chat.id);
            li.innerHTML = `
                <span>${chat.title}</span>
                <i class="fas fa-trash" style="font-size: 0.8rem; color: var(--sub-text-color);" onclick="event.stopPropagation(); deleteChat('${chat.id}');"></i>
            `;
            chatList.appendChild(li);
        });
    }

    function deleteChat(id) {
        if (confirm("¿Estás seguro de que quieres borrar este chat?")) {
            localStorage.removeItem(id);
            if (id === currentChatId) {
                newChat(); // Si borramos el chat actual, empezamos uno nuevo
            }
            loadChatList();
        }
    }

    // Extensiones conocidas por lenguaje
    const LANG_EXT = { python: 'py', javascript: 'js', js: 'js', html: 'html', css: 'css', bash: 'sh', sh: 'sh', sql: 'sql', json: 'json', typescript: 'ts', ts: 'ts', java: 'java', cpp: 'cpp', c: 'c', ruby: 'rb', php: 'php', go: 'go', rust: 'rs', swift: 'swift' };

    function renderBotContent(text, msgDiv, bar, docData) {
        // Detectar bloques de código ```lang ... ```
        const fence = '```';
        const codeBlockRegex = new RegExp(fence + '(\\w*)\\n?([\\s\\S]*?)' + fence, 'g');
        const codeBlocks = []; // {lang, code, placeholder}
        let idx = 0;
        const withPlaceholders = text.replace(codeBlockRegex, (_, lang, code) => {
            codeBlocks.push({ lang: lang.toLowerCase() || 'text', code: code.trim() });
            return '__CODE_BLOCK_' + (idx++) + '__';
        });

        // Renderizar texto con markdown básico
        const safe = withPlaceholders
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
            .replace(/\*(.*?)\*/g,'<em>$1</em>')
            .replace(/`([^`]+)`/g,'<code style="background:#222;padding:1px 5px;border-radius:3px;font-family:monospace">$1</code>')
            .replace(/\n/g,'<br>');

        // Fragmentar en partes de texto y bloques de código
        const parts = safe.split(/(__CODE_BLOCK_\d+__)/);
        parts.forEach(part => {
            const match = part.match(/__CODE_BLOCK_(\d+)__/);
            if (match) {
                const { lang, code } = codeBlocks[parseInt(match[1])];
                const ext = LANG_EXT[lang] || 'txt';
                const block = document.createElement('div');
                block.className = 'code-block';
                const header = document.createElement('div');
                header.className = 'code-block-header';
                header.innerHTML = '<span>' + (lang || 'código') + '</span>';
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = 'Copiar';
                copyBtn.onclick = () => { navigator.clipboard.writeText(code); copyBtn.textContent = '¡Copiado!'; setTimeout(() => copyBtn.textContent = 'Copiar', 2000); };
                header.appendChild(copyBtn);
                const pre = document.createElement('pre');
                pre.textContent = code;
                block.appendChild(header);
                block.appendChild(pre);
                msgDiv.appendChild(block);

                // Botón de descarga en la barra
                const dlBtn = document.createElement('button');
                dlBtn.className = 'download-btn code';
                dlBtn.innerHTML = '<i class="fas fa-download"></i> Descargar .' + ext;
                dlBtn.onclick = () => {
                    const blob = new Blob([code], { type: 'text/plain' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'codigo.' + ext;
                    a.click();
                    URL.revokeObjectURL(a.href);
                };
                bar.appendChild(dlBtn);
            } else if (part.replace(/<br>/g,'').trim()) {
                const span = document.createElement('span');
                span.innerHTML = part;
                msgDiv.appendChild(span);
            }
        });
    }

    function addMessage(text, type, shouldScroll = true, fileData = null) {
        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'display:flex;flex-direction:column;align-items:' + (type === 'user' ? 'flex-end' : 'flex-start');

        const div = document.createElement('div');
        div.className = 'msg ' + type;

        const bar = document.createElement('div');
        bar.className = 'download-bar';

        if (type === 'bot') {
            renderBotContent(text, div, bar, fileData);

            // Botones de archivo generado por IA
            if (fileData) {
                const fmt = fileData.format;
                if (fmt === 'word' || fmt === 'pdf') {
                    // Siempre ofrecer ambos para documentos
                    const btnWord = document.createElement('button');
                    btnWord.className = 'download-btn word';
                    btnWord.innerHTML = '<i class="fas fa-file-word"></i> Descargar Word';
                    btnWord.onclick = () => downloadDocAsWord(fileData);
                    bar.appendChild(btnWord);
                    const btnPDF = document.createElement('button');
                    btnPDF.className = 'download-btn pdf';
                    btnPDF.innerHTML = '<i class="fas fa-file-pdf"></i> Descargar PDF';
                    btnPDF.onclick = () => downloadDocAsPDF(fileData);
                    bar.appendChild(btnPDF);
                } else if (fmt === 'txt') {
                    const btnTxt = document.createElement('button');
                    btnTxt.className = 'download-btn code';
                    const ext = fileData.filename && fileData.filename.includes('.') ? '' : '.txt';
                    btnTxt.innerHTML = '<i class="fas fa-download"></i> Descargar archivo';
                    btnTxt.onclick = () => {
                        const txtContent = fileData.sections.map(s => {
                            if (s.type === 'paragraph' || s.type === 'bold') return s.text;
                            if (s.type === 'list') return s.items.map(i => '- ' + i).join('\n');
                            if (s.type === 'heading1' || s.type === 'heading2') return s.text.toUpperCase();
                            return '';
                        }).join('\n\n');
                        const blob = new Blob([txtContent], { type: 'text/plain' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = (fileData.filename || 'archivo') + ext;
                        a.click(); URL.revokeObjectURL(a.href);
                    };
                    bar.appendChild(btnTxt);
                } else if (fmt === 'csv') {
                    const btnCsv = document.createElement('button');
                    btnCsv.className = 'download-btn code';
                    btnCsv.innerHTML = '<i class="fas fa-file-csv"></i> Descargar CSV';
                    btnCsv.onclick = () => {
                        const tbl = fileData.sections.find(s => s.type === 'table');
                        if (!tbl) return;
                        const rows = [tbl.headers, ...tbl.rows].map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(','));
                        const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = (fileData.filename || 'datos') + '.csv';
                        a.click(); URL.revokeObjectURL(a.href);
                    };
                    bar.appendChild(btnCsv);
                }
            }
        } else {
            div.innerText = text;
        }

        wrapper.appendChild(div);
        if (bar.children.length > 0) wrapper.appendChild(bar);
        chatView.appendChild(wrapper);

        if (shouldScroll) chatView.scrollTop = chatView.scrollHeight;
    }

    // --- GENERACIÓN DE DOCUMENTOS ---

    function pdfAddText(doc, text, margin, maxWidth, lineH, yRef, pageH, bold, fs) {
        doc.setFont('helvetica', bold ? 'bold' : 'normal');
        doc.setFontSize(fs || 11);
        doc.setTextColor(0);
        doc.splitTextToSize(text, maxWidth).forEach(line => {
            if (yRef.y + lineH > pageH - margin) { doc.addPage(); yRef.y = margin; }
            doc.text(line, margin, yRef.y);
            yRef.y += lineH;
        });
    }

    function buildPDF(sections, title, filename) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: 'a4' });
        const margin = 20, pageWidth = doc.internal.pageSize.getWidth(), pageH = doc.internal.pageSize.getHeight();
        const maxW = pageWidth - margin * 2;
        const y = { y: margin };

        sections.forEach(sec => {
            if (sec.type === 'heading1') {
                y.y += 4;
                pdfAddText(doc, sec.text, margin, maxW, 9, y, pageH, true, 16);
                doc.setDrawColor(74,144,226); doc.setLineWidth(0.4);
                doc.line(margin, y.y, pageWidth-margin, y.y); y.y += 6;
            } else if (sec.type === 'heading2') {
                y.y += 3; pdfAddText(doc, sec.text, margin, maxW, 8, y, pageH, true, 13); y.y += 2;
            } else if (sec.type === 'heading3') {
                y.y += 2; pdfAddText(doc, sec.text, margin, maxW, 7, y, pageH, true, 11);
            } else if (sec.type === 'bold') {
                pdfAddText(doc, sec.text, margin, maxW, 7, y, pageH, true, 11);
            } else if (sec.type === 'italic') {
                doc.setFont('helvetica','italic');
                pdfAddText(doc, sec.text, margin, maxW, 7, y, pageH, false, 11);
            } else if (sec.type === 'paragraph') {
                pdfAddText(doc, sec.text, margin, maxW, 7, y, pageH, false, 11); y.y += 2;
            } else if (sec.type === 'list') {
                (sec.items||[]).forEach(item => pdfAddText(doc, '- ' + item, margin+4, maxW-4, 7, y, pageH, false, 11));
                y.y += 2;
            } else if (sec.type === 'table') {
                const cols = (sec.headers||['Col']).length;
                const colW = maxW / cols;
                doc.setFont('helvetica','bold'); doc.setFontSize(10);
                (sec.headers||[]).forEach((h,i) => {
                    doc.setFillColor(74,144,226); doc.setTextColor(255);
                    doc.rect(margin + i*colW, y.y-5, colW, 7, 'F');
                    doc.text(String(h), margin + i*colW + 2, y.y);
                });
                doc.setTextColor(0); doc.setFont('helvetica','normal');
                y.y += 4;
                (sec.rows||[]).forEach(row => {
                    row.forEach((cell,i) => doc.text(String(cell), margin + i*colW + 2, y.y));
                    y.y += 7;
                    if (y.y > pageH - margin) { doc.addPage(); y.y = margin; }
                });
                y.y += 3;
            } else if (sec.type === 'separator') {
                y.y += 3; doc.setDrawColor(180); doc.setLineWidth(0.3);
                doc.line(margin, y.y, pageWidth-margin, y.y); y.y += 6;
            } else if (sec.type === 'signature') {
                y.y += 8; pdfAddText(doc, sec.text, margin, maxW, 7, y, pageH, false, 10); y.y += 4;
            }
        });

        doc.setFontSize(8); doc.setTextColor(150);
        doc.text('Generado por Asistente IA', margin, pageH - 10);
        doc.save((filename || 'documento') + '.pdf');
    }

    async function buildWord(sections, title, filename) {
        const { Document, Packer, Paragraph, TextRun, HeadingLevel,
                Table, TableRow, TableCell, WidthType, BorderStyle, ShadingType } = docx;
        const children = [];
        for (const sec of sections) {
            if (sec.type === 'heading1') {
                children.push(new Paragraph({ text: sec.text, heading: HeadingLevel.HEADING_1, spacing: { after: 200 } }));
            } else if (sec.type === 'heading2') {
                children.push(new Paragraph({ text: sec.text, heading: HeadingLevel.HEADING_2, spacing: { after: 150 } }));
            } else if (sec.type === 'heading3') {
                children.push(new Paragraph({ text: sec.text, heading: HeadingLevel.HEADING_3, spacing: { after: 100 } }));
            } else if (sec.type === 'paragraph') {
                children.push(new Paragraph({ children: [new TextRun({ text: sec.text, size: 24 })], spacing: { after: 200 } }));
            } else if (sec.type === 'bold') {
                children.push(new Paragraph({ children: [new TextRun({ text: sec.text, bold: true, size: 24 })], spacing: { after: 150 } }));
            } else if (sec.type === 'italic') {
                children.push(new Paragraph({ children: [new TextRun({ text: sec.text, italics: true, size: 24 })], spacing: { after: 150 } }));
            } else if (sec.type === 'list') {
                for (const item of (sec.items||[])) {
                    children.push(new Paragraph({ children: [new TextRun({ text: item, size: 24 })], bullet: { level: 0 }, spacing: { after: 100 } }));
                }
            } else if (sec.type === 'table') {
                const rows = [];
                if (sec.headers) {
                    rows.push(new TableRow({ children: sec.headers.map(h =>
                        new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, size: 22 })] })],
                            shading: { fill: '4A90E2', type: ShadingType.CLEAR, color: 'auto' } })
                    )}));
                }
                for (const row of (sec.rows||[])) {
                    rows.push(new TableRow({ children: row.map(cell =>
                        new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: String(cell), size: 22 })] })] })
                    )}));
                }
                children.push(new Table({ rows, width: { size: 100, type: WidthType.PERCENTAGE } }));
                children.push(new Paragraph({ text: '' }));
            } else if (sec.type === 'separator') {
                children.push(new Paragraph({ border: { bottom: { color: 'AAAAAA', space: 1, size: 6, style: BorderStyle.SINGLE } }, spacing: { after: 200 } }));
            } else if (sec.type === 'signature') {
                children.push(new Paragraph({ children: [new TextRun({ text: sec.text, size: 22 })], spacing: { before: 400, after: 200 } }));
            }
        }
        const wordDoc = new Document({ sections: [{ properties: {}, children }] });
        const blob = await Packer.toBlob(wordDoc);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = (filename||'documento') + '.docx'; a.click();
        URL.revokeObjectURL(url);
    }

    function downloadDocAsPDF(fileData) {
        try { buildPDF(fileData.sections, fileData.title, fileData.filename); }
        catch(e) { alert('Error PDF: ' + e.message); }
    }

    async function downloadDocAsWord(fileData) {
        try { await buildWord(fileData.sections, fileData.title, fileData.filename); }
        catch(e) { alert('Error Word: ' + e.message); }
    }

    function downloadTextAsPDF(text) {
        buildPDF(text.split('\n').filter(l => l.trim()).map(l => ({ type: 'paragraph', text: l })), 'Respuesta', 'respuesta');
    }

    async function downloadTextAsWord(text) {
        await buildWord(text.split('\n').filter(l => l.trim()).map(l => ({ type: 'paragraph', text: l })), 'Respuesta', 'respuesta');
    }

    // --- LÓGICA DE ACCESO (Mantenida) ---
    async function checkAccessKey() {
        const key = accessKeyInput.value.trim();
        if (!key) return;
        
        try {
            accessKeyInput.disabled = true;
            
            const req = await fetch(NETLIFY_FUNCTION_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    messages: [{ role: 'user', content: 'check key' }],
                    access_key: key 
                })
            });

            if (req.status === 200) {
                accessKey = key;
                localStorage.setItem(ACCESS_KEY_STORAGE, key); 
                accessError.style.display = 'none';
                accessKeyInput.disabled = false;
                showWelcomeView(); 
            } else if (req.status === 401) {
                accessError.innerText = "Clave incorrecta. Inténtalo de nuevo.";
                accessError.style.display = 'block';
                accessKeyInput.value = '';
                accessKeyInput.disabled = false;
                accessKeyInput.focus();
            } else {
                 accessError.innerText = "Error de conexión con el servidor. Código: " + req.status;
                 accessError.style.display = 'block';
                 accessKeyInput.disabled = false;
            }
        } catch (e) {
            accessError.innerText = "Error de red. Asegúrate de tener conexión.";
            accessError.style.display = 'block';
            accessKeyInput.disabled = false;
        }
    }

    // --- MANEJO DE ARCHIVOS ---

    let attachedFileReady = false;

    async function handleFileUpload() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];

        if (!file) {
            clearAttachment();
            return;
        }

        attachedFileName = file.name;
        attachedFileBase64 = null;
        attachedFileText = null;
        attachedFileReady = false;
        attachedFileMime = file.type || 'application/octet-stream';

        // Icono naranja = procesando
        attachBtn.querySelector('.fas.fa-paperclip').style.color = '#f0a500';
        inputField.placeholder = `Procesando ${attachedFileName}...`;

        try {
            if (file.type === 'application/pdf') {
                // PDF: extraer texto en el navegador con PDF.js
                const arrayBuffer = await file.arrayBuffer();
                const pdfjsLib = window['pdfjs-dist/build/pdf'];
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n';
                }
                attachedFileText = fullText.trim();
                if (!attachedFileText) {
                    inputField.placeholder = '⚠️ El PDF no contiene texto seleccionable (puede ser escaneado). Prueba con una imagen.';
                    attachBtn.querySelector('.fas.fa-paperclip').style.color = '#e05555';
                    attachedFileReady = false;
                    return;
                }
            } else {
                // Imagen u otro archivo: leer como base64
                await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        attachedFileBase64 = e.target.result.split(',')[1];
                        resolve();
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            attachedFileReady = true;
            attachBtn.querySelector('.fas.fa-paperclip').style.color = 'var(--accent-color)';
            inputField.placeholder = `📎 ${attachedFileName} listo. Escribe tu consulta o envía directamente.`;

        } catch (err) {
            console.error('Error procesando archivo:', err);
            alert('Error al procesar el archivo: ' + err.message);
            clearAttachment();
        }
    }

    function clearAttachment() {
        attachedFileBase64 = null;
        attachedFileName = null;
        attachedFileMime = null;
        attachedFileText = null;
        attachedFileReady = false;
        document.getElementById('file-input').value = '';
        attachBtn.querySelector('.fas.fa-paperclip').style.color = 'var(--sub-text-color)';
        inputField.placeholder = 'Escribe tu consulta aquí...';
    }

    // --- Función Principal de Envío ---

    async function send() {
        if (!accessKey) {
            alert('Por favor, ingresa la clave de acceso primero.');
            showAccessView();
            return;
        }

        const text = inputField.value.trim();

        // Si el archivo fue seleccionado pero el FileReader aún no terminó
        if (attachedFileName && !attachedFileReady) {
            alert('El archivo aún se está cargando. Espera un momento e inténtalo de nuevo.');
            return;
        }

        // Si no hay texto ni archivo adjunto, no hacer nada
        if (!text && !attachedFileBase64) return;

        // Texto limpio para mostrar en el chat
        const displayText = attachedFileName
            ? (text ? `${text} [📎 ${attachedFileName}]` : `📎 ${attachedFileName}`)
            : text;

        showChatView();

        addMessage(displayText, 'user');
        chatHistory.push({ role: 'user', content: displayText });
        saveCurrentChat();

        // Guardar datos del archivo antes de limpiar
        const fileBase64 = attachedFileBase64;
        const fileMime = attachedFileMime;
        const fileName = attachedFileName;
        const fileText = attachedFileText;

        // Limpiar UI inmediatamente
        inputField.value = '';
        inputField.style.height = '1.5em';
        inputField.disabled = true;
        sendBtn.disabled = true;
        attachBtn.disabled = true;
        clearAttachment();

        try {
            const messagesToSend = chatHistory.slice(1);

            const requestBody = {
                messages: messagesToSend,
                access_key: accessKey,
                ...(fileBase64 && {
                    file_base64: fileBase64,
                    file_mime: fileMime,
                    file_name: fileName
                }),
                ...(fileText && {
                    file_text: fileText,
                    file_name: fileName
                })
            };

            const req = await fetch(NETLIFY_FUNCTION_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            if (req.status === 401) {
                addMessage("Error de autenticación. Por favor, re-ingresa tu clave de acceso.", 'bot');
                localStorage.removeItem(ACCESS_KEY_STORAGE);
                accessKey = null;
                setTimeout(showAccessView, 3000);
                return;
            }

            const res = await req.json();
            const replyText = res.reply || res.error || "ERROR: Fallo en la respuesta del servidor.";
            const fileData = res.file || null;

            addMessage(replyText, 'bot', true, fileData);
            chatHistory.push({ role: 'assistant', content: replyText });
            saveCurrentChat();

        } catch (e) {
            addMessage("ERROR CRÍTICO: No se pudo establecer la conexión de red con el backend.", 'bot');
            chatHistory.push({ role: 'assistant', content: "Error de red." });
            saveCurrentChat();
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            attachBtn.disabled = false;
            inputField.focus();
        }
    }
    
    // --- Inicialización ---
    document.addEventListener('DOMContentLoaded', () => {
        loadChatList();
        
        if (accessKey) {
            showWelcomeView();
        } else {
            showAccessView();
        }
    });
</script>
